name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. Schema validation (fast, no Rust needed)
  # ─────────────────────────────────────────────────────────────────────
  schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: bash scripts/verify-schemas.sh

  # ─────────────────────────────────────────────────────────────────────
  # 2. Rust build + test + lint
  # ─────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.79"]  # MSRV + latest stable
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            polyref/target
          key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('polyref/Cargo.toml', 'polyref/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.toolchain }}-

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # ─────────────────────────────────────────────────────────────────────
  # 3. Supply-chain audit (cargo-deny)
  # ─────────────────────────────────────────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ─────────────────────────────────────────────────────────────────────
  # 4. Schema ↔ Rust drift check
  # ─────────────────────────────────────────────────────────────────────
  drift:
    name: Schema-bindings drift
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace
      - run: bash scripts/schema-bindings-check.sh

  # ─────────────────────────────────────────────────────────────────────
  # 5. Security scan (CodeQL + dependency review)
  # ─────────────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0

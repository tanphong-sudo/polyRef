openapi: 3.0.3
info:
  title: PolyRef Layer 4 Users Fixture
  version: 1.0.0
paths:
  /users:
    post:
      operationId: createUser
      summary: Create a user in the v1 API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateV1'
      responses:
        '201':
          description: Created user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserV1'
components:
  schemas:
    UserCreateV1:
      type: object
      required:
        - email
        - name
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    UserV1:
      type: object
      required:
        - id
        - email
        - name
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
